handlers=java.util.logging.ConsoleHandler
.level=INFO

java.util.logging.ConsoleHandler.level=ALL
java.util.logging.ConsoleHandler.formatter=java.util.logging.SimpleFormatter

# Oracle JDBC / UCP loggers
oracle.ucp.level=ALL
oracle.jdbc.level=ALL
oracle.net.level=ALL

# Pool logger name matches the data source name
shardDemoDataSource.level=ALL
ShardDemoPool.level=ALL
writeDataSource.level=ALL
readDataSource.level=ALL

# UCP feature logging: enable everything, including sharding
clio.feature.all=on
